<!DOCTYPE HTML>
<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🌤 Weather App</h1>

    <form action="/getweather" method="POST">
        <input type="text" name="city" placeholder="Enter city..." required>
        <button type="submit">Search</button>
    </form>

    {% if data %}
        <div class="card">
            <h2>{{ data.location }}</h2>
            <p><strong>Country:</strong> {{ data.country_code }}</p>
            <p><strong>Temperature:</strong> {{ data.temp }}</p>
        </div>
    {% endif %}

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}
</div>

</body>
</html>
