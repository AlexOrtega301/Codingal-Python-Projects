<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vowel Counter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>Vowel Counter</h1>

        <form method="POST" action="/">
            <textarea name="input_string" placeholder="Enter text here..." required></textarea>
            <br><br>
            <button type="submit">Count Vowels</button>
        </form>

        {% if number_of_vowels is not none %}
            <div class="card">
                <h2>Result</h2>
                <p>Number of vowels: {{ number_of_vowels }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
